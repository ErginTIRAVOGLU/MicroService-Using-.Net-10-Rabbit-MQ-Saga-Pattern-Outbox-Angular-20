<nav class="navbar">
  <!-- Left side of the navbar: Logo + Departments -->
  <div class="navbar__left">
    <a routerLink="/" class="navbar__logo"><fa-icon [icon]="faCoffee" />Amazing</a>
    <button [routerLink]="['/store']" class="navbar__departments"><fa-icon [icon]="faUser" />Store</button>
  </div>
  <!-- Center:Search -->
  <div class="navbar__center">
    <select class="navbar__category">
      <option value="all">All</option>
      <option value="electronics">Electronics</option>
      <option value="fashion">Fashion</option>
      <option value="home">Home</option>
      <option value="books">Books</option>
    </select>
    <input
      [(ngModel)]="searchText"
      type="text"
      class="navbar__search"
      placeholder="Search for products..."
      (keyup.enter)="onSearch()"
    />
    <button class="navbar__search-btn" (click)="onSearch()">Search</button>
  </div>
  <!-- Right:Account+ Cart -->
  <div class="navbar__right">
    @if (isLoggedIn) {
      <a routerLink="/store/orders" class="navbar__link">
        Hello, {{ userName }} <br /><span>Account & Orders</span>
      </a>
      <button class="navbar__link navbar__logout" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/auth/login" class="navbar__link">
        Hello, Sign In <br /><span>Account & Orders</span>
      </a>
      <a routerLink="/auth/register" class="navbar__link">Register</a>
    }

    <ng-template #loggedOut>
      <a routerLink="/auth/loggin" class="navbar__link">
        Hello, Sign in<br /><span>Account & Orders</span>
      </a>
      <a routerLink="/auth/register" class="navbar_link">Register</a>
    </ng-template>

    <!-- Cart -->
    <a
      routerLink="/store/basket"
      class="navbar__link navbar__cart"
      title="You have {{ cartCount }} items in your cart"
    >
      <span>🛒</span>
      <span>Cart</span>
      @if (cartCount > 0) {
        <span class="navbar__cart-badge">{{ cartCount }}</span>
      }
    </a>
  </div>
</nav>
